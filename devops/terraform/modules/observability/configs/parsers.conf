# Fluent Bit 파서 — Spring Boot 4 의 Logback JSON Encoder 기본 형식
# 사용 시 application.yml 에 다음 활성:
#   logging.config: classpath:logback-json.xml  (또는 logback-spring.xml 에서 net.logstash.logback 사용)

[PARSER]
    Name        spring_json
    Format      json
    Time_Key    @timestamp
    Time_Format %Y-%m-%dT%H:%M:%S.%L%z
    Time_Keep   On

[PARSER]
    Name        nginx
    Format      regex
    Regex       ^(?<remote>[^ ]*) (?<host>[^ ]*) (?<user>[^ ]*) \[(?<time>[^\]]*)\] "(?<method>\S+)(?: +(?<path>[^\"]*?)(?: +\S*)?)?" (?<code>[^ ]*) (?<size>[^ ]*) "(?<referer>[^\"]*)" "(?<agent>[^\"]*)"
    Time_Key    time
    Time_Format %d/%b/%Y:%H:%M:%S %z
