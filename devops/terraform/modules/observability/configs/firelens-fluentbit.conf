# Fluent Bit (FireLens) 설정
# 08-observability.md 의 로그 파이프라인 — Spring Boot 로그 → 파싱 → PII 마스킹 → CloudWatch Logs
# 사용:
#   - ECS Task Definition 의 메인 컨테이너 logConfiguration.logDriver = "awsfirelens"
#   - FireLens 컨테이너 (aws-for-fluent-bit) 가 본 설정을 읽어 처리
#   - 환경변수 ENVIRONMENT, SERVICE_NAME, AWS_REGION 은 task definition 에서 주입

[SERVICE]
    Flush         5
    Daemon        Off
    Log_Level     info
    Parsers_File  parsers.conf
    HTTP_Server   On
    HTTP_Listen   0.0.0.0
    HTTP_Port     2020

# ----------------------------------------------------------------------------
# 입력은 ECS FireLens 가 자동 — 본 설정은 필터·출력만 담당
# ----------------------------------------------------------------------------

# Spring Boot JSON 로그 파싱
[FILTER]
    Name          parser
    Match         *
    Key_Name      log
    Parser        spring_json
    Reserve_Data  On

# 환경·서비스 식별자 부착
[FILTER]
    Name          modify
    Match         *
    Add           environment ${ENVIRONMENT}
    Add           service     ${SERVICE_NAME}
    Add           project     tech-n-ai

# PII 마스킹 — Lua 스크립트
[FILTER]
    Name          lua
    Match         *
    script        masking.lua
    call          mask_pii

# WARN 이상만 OpenSearch 로 추가 송신 (옵션, OpenSearch 도입 시 활성)
# [FILTER]
#     Name          grep
#     Match         opensearch.*
#     Regex         level (WARN|ERROR|FATAL)

# ----------------------------------------------------------------------------
# 출력 — CloudWatch Logs (기본)
# ----------------------------------------------------------------------------

[OUTPUT]
    Name              cloudwatch_logs
    Match             *
    region            ${AWS_REGION}
    log_group_name    /aws/ecs/${ENVIRONMENT}/${SERVICE_NAME}
    log_stream_prefix firelens-
    auto_create_group true
    log_retention_days 30
    log_key           log
