spring:
  application:
    name: gateway-api
  main:
    web-application-type: reactive

  cloud:
    gateway:
      metrics:
        enabled: true
      server:
        webflux:
          # 라우팅 설정
          routes:
            - id: auth-route
              uri: ${gateway.routes.auth.uri:http://localhost:8083}
              predicates:
                - Path=/api/v1/auth/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: authCircuitBreaker
                    fallbackUri: forward:/fallback
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 10
                    redis-rate-limiter.burstCapacity: 20
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@ipKeyResolver}"
                    deny-empty-key: false

            - id: bookmark-route
              uri: ${gateway.routes.bookmark.uri:http://localhost:8085}
              predicates:
                - Path=/api/v1/bookmark/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: bookmarkCircuitBreaker
                    fallbackUri: forward:/fallback
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 100
                    redis-rate-limiter.burstCapacity: 150
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@userKeyResolver}"
                    deny-empty-key: false

            - id: chatbot-route
              uri: ${gateway.routes.chatbot.uri:http://localhost:8084}
              predicates:
                - Path=/api/v1/chatbot/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: chatbotCircuitBreaker
                    fallbackUri: forward:/fallback
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 100
                    redis-rate-limiter.burstCapacity: 150
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@userKeyResolver}"
                    deny-empty-key: false

            - id: agent-route
              uri: ${gateway.routes.agent.uri:http://localhost:8086}
              predicates:
                - Path=/api/v1/agent/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: agentCircuitBreaker
                    fallbackUri: forward:/fallback
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 100
                    redis-rate-limiter.burstCapacity: 150
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@userKeyResolver}"
                    deny-empty-key: false

            - id: emerging-tech-route
              uri: ${gateway.routes.emerging-tech.uri:http://localhost:8082}
              predicates:
                - Path=/api/v1/emerging-tech/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: emergingTechCircuitBreaker
                    fallbackUri: forward:/fallback
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 30
                    redis-rate-limiter.burstCapacity: 50
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@ipKeyResolver}"
                    deny-empty-key: false

          # HTTP 클라이언트 연결 풀 설정
          httpclient:
            pool:
              # 연결 풀 설정
              max-idle-time: 30000        # 30초 (백엔드 keep-alive 60초보다 짧게)
              max-life-time: 300000       # 5분 (300초)
              max-connections: 500        # 최대 연결 수
              acquire-timeout: 45000      # 연결 획득 타임아웃 (45초)
              pending-acquire-timeout: 60000  # 대기 타임아웃 (60초)
            # 연결 타임아웃
            connection-timeout: 30000     # 연결 타임아웃 (30초)
            # 소켓 타임아웃
            response-timeout: 60000       # 응답 타임아웃 (60초, 백엔드 타임아웃보다 길게)

          # Global CORS 설정
          globalcors:
            cors-configurations:
              '[/**]':
                allowCredentials: true
                allowedOriginPatterns:
                  - "http://localhost:*"
                  - "http://127.0.0.1:*"
                allowedHeaders: "*"
                allowedMethods: [GET, POST, PUT, PATCH, DELETE, OPTIONS, HEAD]
                maxAge: 3600

          # Global default-filters
          default-filters:
            # 외부 API 연동 시 중복 헤더 제거
            - DedupeResponseHeader=Access-Control-Allow-Origin, RETAIN_LAST
            # GET 요청 503 응답 시 최대 2회 재시도 (지수 백오프)
            - name: Retry
              args:
                retries: 2
                methods: GET
                statuses: SERVICE_UNAVAILABLE
                backoff:
                  firstBackoff: 100ms
                  maxBackoff: 500ms
                  factor: 2
            # 요청 본문 크기 제한 (5MB 초과 시 413 반환)
            - name: RequestSize
              args:
                maxSize: 5MB

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,gateway
  prometheus:
    metrics:
      export:
        enabled: true
  otlp:
    metrics:
      export:
        enabled: ${OTLP_METRICS_ENABLED:false}
  dynatrace:
    metrics:
      export:
        enabled: ${DYNATRACE_METRICS_ENABLED:false}

# Resilience4j Circuit Breaker 설정
resilience4j:
  circuitbreaker:
    configs:
      default:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        wait-duration-in-open-state: 10s
        failure-rate-threshold: 50
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
    instances:
      authCircuitBreaker:
        base-config: default
      bookmarkCircuitBreaker:
        base-config: default
      chatbotCircuitBreaker:
        base-config: default
        # Chatbot은 LLM 호출로 응답이 느릴 수 있으므로 임계값을 완화
        sliding-window-size: 20
        minimum-number-of-calls: 10
      agentCircuitBreaker:
        base-config: default
        sliding-window-size: 20
        minimum-number-of-calls: 10
      emergingTechCircuitBreaker:
        base-config: default
  timelimiter:
    configs:
      default:
        timeout-duration: 60s
    instances:
      chatbotCircuitBreaker:
        timeout-duration: 120s
      agentCircuitBreaker:
        timeout-duration: 120s

# Gateway 보안 경로 설정
gateway:
  security:
    # 인증 불필요 경로 (PathPattern 형식)
    public-paths:
      - /api/v1/auth/admin/login    # 관리자 로그인 (구체적 경로 우선)
      - /api/v1/auth/**
      - /api/v1/emerging-tech/**
      - /actuator/**
    # public-paths에서 제외 (exclusion > inclusion)
    public-path-exclusions:
      - /api/v1/auth/admin/**
    # 관리자 전용 경로 (ADMIN role 필수)
    admin-only-paths:
      - /api/v1/agent/**
      - /api/v1/auth/admin/**

server:
  port: 8081
  netty:
    connection-timeout: 3000  # 3초 (클라이언트 연결 타임아웃)

